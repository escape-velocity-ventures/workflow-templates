# Reusable AI Code Review Workflow
#
# Runs two parallel AI reviews on every PR:
#   1. General code quality review (Cybill)
#   2. Security-focused review (Cybill's Security Patrol)
#
# When app-id + app-private-key are provided AND the repo's OWNERS file sets
# agent_approval_counts: true, reviews are submitted as formal GitHub
# approvals/request-changes rather than plain comments. A short-lived
# installation token is minted fresh each run via actions/create-github-app-token.
#
# Usage from any repo:
#
#   jobs:
#     ai-review:
#       uses: escape-velocity-ventures/workflow-templates/.github/workflows/reusable-ai-review.yml@main
#       secrets: inherit
#
# Required repo/org secrets:
#   ANTHROPIC_API_KEY           — Anthropic API key for Claude
#   OPENAI_API_KEY              — (optional) OpenAI API key for Codex fallback
#   XAI_API_KEY                 — (optional) xAI API key for Grok fallback
#   TINKERBELLE_APP_ID          — (optional) GitHub App ID for formal reviews
#   TINKERBELLE_APP_PRIVATE_KEY — (optional) GitHub App private key
#
# Optional inputs:
#   enable-general-review: true
#   enable-security-review: true
#   review-provider-order: 'anthropic,openai,xai'
#   owners-file: 'OWNERS'
#
# OWNERS file (JSON, repo root) controls agent approval semantics.
# See OWNERS.example in TinkerBelle repo for the full schema.
#
# Status checks to add as required in branch protection:
#   - "General Code Review (Cybill)"
#   - "Security Review (Cybill)"
#   - "Security Gate"    ← blocks merge when Cybill requests changes

name: Reusable AI Code Review

on:
  workflow_call:
    inputs:
      enable-general-review:
        description: 'Run general code quality review'
        type: boolean
        default: true
      enable-security-review:
        description: 'Run security-focused review'
        type: boolean
        default: true
      fail-on-warnings:
        description: 'Treat warning-level findings (🟡) as merge-blocking in both reviews'
        type: boolean
        default: false
      require-general-pass:
        description: 'Fail General Code Review check when Cybill requests changes'
        type: boolean
        default: false
      constrain-to-prior-findings:
        description: 'Constrain review output to unresolved findings from the latest prior Cybill review; allow net-new findings only when critical'
        type: boolean
        default: true
      review-provider-order:
        description: 'Comma-separated provider fallback order. Supported: anthropic, openai, xai'
        type: string
        default: 'anthropic,openai,xai'
      openai-model:
        description: 'OpenAI model for fallback reviews'
        type: string
        default: 'gpt-5-codex'
      xai-model:
        description: 'xAI model for Grok fallback reviews'
        type: string
        default: 'grok-4-1-fast-reasoning'
      owners-file:
        description: 'Path to OWNERS file relative to repo root (JSON format)'
        type: string
        default: 'OWNERS'
    secrets:
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key for Claude'
        required: true
      TINKERBELLE_APP_ID:
        description: 'TinkerBelle App for GitHub — numeric App ID. Enables formal approve/request-changes reviews. Without this, falls back to comment-only.'
        required: false
      TINKERBELLE_APP_PRIVATE_KEY:
        description: 'TinkerBelle App for GitHub — private key (.pem contents). Required when app-id is provided.'
        required: false
      OPENAI_API_KEY:
        description: 'OpenAI API key for Codex fallback reviews'
        required: false
      XAI_API_KEY:
        description: 'xAI API key for Grok fallback reviews'
        required: false

jobs:
  # ── Setup: Read OWNERS config ─────────────────────────────────────────────
  setup:
    name: Load Review Config
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.skip.outputs.skip }}
      agent-can-approve: ${{ steps.owners.outputs.agent-can-approve }}
      require-security-pass: ${{ steps.owners.outputs.require-security-pass }}
      has-bot-token: ${{ steps.bot.outputs.has-bot-token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check skip-review label
        id: skip
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"skip-review"'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "PR has skip-review label — all reviews will be skipped"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read OWNERS file
        id: owners
        run: |
          OWNERS_PATH="${{ inputs.owners-file }}"
          if [ ! -f "$OWNERS_PATH" ]; then
            echo "No OWNERS file at '$OWNERS_PATH' — using defaults (comment-only, security gate enabled)"
            echo "agent-can-approve=false" >> "$GITHUB_OUTPUT"
            echo "require-security-pass=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 - <<'PYEOF'
          import json, os, sys

          path = os.environ["OWNERS_PATH"]
          try:
              with open(path) as f:
                  owners = json.load(f)
          except Exception as e:
              print(f"Warning: Could not parse OWNERS file: {e}", file=sys.stderr)
              owners = {}

          rules = owners.get("rules", {})
          can_approve = "true" if rules.get("agent_approval_counts", False) else "false"
          require_security = "true" if rules.get("require_security_pass", True) else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"agent-can-approve={can_approve}\n")
              f.write(f"require-security-pass={require_security}\n")

          print(f"OWNERS loaded: agent-can-approve={can_approve}, require-security-pass={require_security}")

          # Summarize authorized agents
          agents = owners.get("agents", [])
          if agents:
              print(f"Authorized agents: {[a.get('id', '?') for a in agents]}")
          PYEOF
        env:
          OWNERS_PATH: ${{ inputs.owners-file }}

      - name: Check app credentials availability
        id: bot
        run: |
          if [ -n "$APP_ID" ] && [ -n "$APP_PRIVATE_KEY" ]; then
            echo "has-bot-token=true" >> "$GITHUB_OUTPUT"
            echo "App credentials: present — formal review mode enabled"
          else
            echo "has-bot-token=false" >> "$GITHUB_OUTPUT"
            echo "App credentials: not configured — comment-only mode"
          fi
        env:
          APP_ID: ${{ secrets.TINKERBELLE_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.TINKERBELLE_APP_PRIVATE_KEY }}

  # ── General Code Review ───────────────────────────────────────────────────
  general-review:
    name: General Code Review (Cybill)
    runs-on: ubuntu-latest
    needs: setup
    if: inputs.enable-general-review && needs.setup.outputs.skip != 'true'
    permissions:
      contents: read
      pull-requests: write
    outputs:
      critical-count: ${{ steps.generate.outputs.critical-count }}
      warning-count: ${{ steps.generate.outputs.warning-count }}
      action: ${{ steps.generate.outputs.action }}
      provider: ${{ steps.generate.outputs.provider }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR context
        id: pr-context
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request

          repo = os.environ["REPO"]
          event_pr = (os.environ.get("EVENT_PR_NUMBER") or "").strip()
          event_head = (os.environ.get("EVENT_HEAD_SHA") or "").strip()
          fallback_sha = (os.environ.get("GITHUB_SHA") or "").strip()

          pr_number = event_pr
          head_sha = event_head or fallback_sha

          if not pr_number and head_sha:
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/commits/{head_sha}/pulls",
                  headers={
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  pulls = json.loads(resp.read())
              if pulls:
                  open_pulls = [p for p in pulls if p.get("state") == "open"]
                  pick = open_pulls[0] if open_pulls else pulls[0]
                  pr_number = str(pick.get("number") or "")
                  if not event_head:
                      head_sha = (pick.get("head") or {}).get("sha") or head_sha

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"pr-number={pr_number}\n")
              f.write(f"head-sha={head_sha}\n")
              f.write(f"has-pr-context={'true' if pr_number else 'false'}\n")
          PYEOF

      - name: Get PR diff
        id: diff
        if: steps.pr-context.outputs.has-pr-context == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr-context.outputs.pr-number }}
        run: |
          echo "Fetching diff for PR #${PR_NUMBER}..."

          RAW_DIFF=$(gh pr diff "${PR_NUMBER}" --repo "${{ github.repository }}" 2>&1)
          DIFF_LEN=${#RAW_DIFF}
          echo "${RAW_DIFF}" > /tmp/pr_diff.txt
          echo "truncated=false" >> "$GITHUB_OUTPUT"
          echo "Diff captured in full (${DIFF_LEN} chars)"
          echo "diff_len=${DIFF_LEN}" >> "$GITHUB_OUTPUT"

      - name: Load prior general findings
        id: prior-findings
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr-context.outputs.pr-number }}
          HEAD_SHA: ${{ steps.pr-context.outputs.head-sha }}
          CONSTRAIN: ${{ inputs.constrain-to-prior-findings }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, urllib.request

          out_path = "/tmp/prior_general_review.txt"
          open(out_path, "w").close()
          if os.environ.get("CONSTRAIN", "true") != "true":
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("has-prior-findings=false\n")
              sys.exit(0)

          repo = os.environ["REPO"]
          pr = (os.environ.get("PR_NUMBER") or "").strip()
          head_sha = (os.environ.get("HEAD_SHA") or "").strip()
          if not pr:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("has-prior-findings=false\n")
              sys.exit(0)
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/pulls/{pr}/reviews?per_page=100",
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              reviews = json.loads(resp.read())

          candidates = []
          for r in reviews:
              user = (r.get("user") or {}).get("login")
              body = r.get("body") or ""
              commit_id = r.get("commit_id") or ""
              submitted = r.get("submitted_at") or ""
              if user != "tinkerbelle-app-for-github[bot]":
                  continue
              if "## 🐾 Cybill's Code Review" not in body:
                  continue
              if not submitted or commit_id == head_sha:
                  continue
              candidates.append((submitted, body, commit_id))

          has_prior = bool(candidates)
          if has_prior:
              submitted, body, commit_id = sorted(candidates, key=lambda x: x[0])[-1]
              if len(body) > 12000:
                  body = body[:12000] + "\n\n[truncated prior review context]"
              with open(out_path, "w") as f:
                  f.write(body)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"has-prior-findings={'true' if has_prior else 'false'}\n")
              if has_prior:
                  f.write(f"prior-findings-commit={commit_id}\n")
                  f.write(f"prior-findings-submitted-at={submitted}\n")
          PYEOF

      - name: Generate review
        id: generate
        if: steps.pr-context.outputs.has-pr-context == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TRUNCATED: ${{ steps.diff.outputs.truncated }}
          DIFF_LEN: ${{ steps.diff.outputs.diff_len }}
          FAIL_ON_WARNINGS: ${{ inputs.fail-on-warnings }}
          REVIEW_PROVIDER_ORDER: ${{ inputs.review-provider-order }}
          OPENAI_MODEL: ${{ inputs.openai-model }}
          XAI_MODEL: ${{ inputs.xai-model }}
          CONSTRAIN_PRIOR: ${{ inputs.constrain-to-prior-findings }}
          HAS_PRIOR_FINDINGS: ${{ steps.prior-findings.outputs.has-prior-findings }}
          PRIOR_FINDINGS_COMMIT: ${{ steps.prior-findings.outputs.prior-findings-commit }}
          PRIOR_FINDINGS_SUBMITTED_AT: ${{ steps.prior-findings.outputs.prior-findings-submitted-at }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, urllib.request, urllib.error

          diff = open("/tmp/pr_diff.txt").read()
          prior_findings = ""
          if os.path.exists("/tmp/prior_general_review.txt"):
              prior_findings = open("/tmp/prior_general_review.txt").read()
          truncated = os.environ.get("TRUNCATED", "false") == "true"
          diff_len = os.environ.get("DIFF_LEN", "0")

          system_prompt = (
              "You are Cybill-Lynne [not a] Shepard, a Great Pyrenees and senior code reviewer "
              "at Escape Velocity Ventures. You review code with the energy of a disappointed but "
              "loving dog. You are direct, occasionally reference being a dog, and end with a paw rating.\n\n"
              "Review this diff for:\n"
              "- Correctness and potential bugs\n"
              "- Security issues (leaked secrets, SQL injection, XSS) — even I know not to leave the gate open\n"
              "- Pattern violations (check if it follows existing codebase conventions)\n"
              "- Test coverage (are new features tested?)\n"
              "- Unnecessary complexity\n\n"
              "Be concise. Flag issues by severity: 🔴 Critical, 🟡 Warning, 🟢 Suggestion.\n"
              "If the code looks good, say so briefly — do not invent problems.\n\n"
              "Rate the PR 1-5 paws (🐾). Use dog metaphors sparingly but effectively.\n"
              "End every review with your paw rating and sign off as Cybill."
          )
          constrain_prior = os.environ.get("CONSTRAIN_PRIOR", "true") == "true"
          has_prior = os.environ.get("HAS_PRIOR_FINDINGS", "false") == "true"
          if constrain_prior and has_prior:
              system_prompt += (
                  "\n\nREVIEW MODE: PRIOR-FINDINGS-ONLY\n"
                  "- Validate remediation against the provided prior Cybill findings baseline.\n"
                  "- Report only unresolved prior findings.\n"
                  "- Do NOT introduce net-new issues unless they are clearly 🔴 Critical regressions.\n"
                  "- If prior findings are resolved, approve and state that prior findings are resolved.\n"
              )

          user_content = f"Please review this pull request diff:\n\n```diff\n{diff}\n```"
          if truncated:
              user_content += f"\n\n> ⚠️ Diff was truncated (full diff: {diff_len} chars). Review what's visible."
          if constrain_prior and has_prior and prior_findings.strip():
              user_content += (
                  "\n\nPrior Cybill findings baseline (only unresolved findings should be reported):\n\n"
                  f"{prior_findings}\n"
                  f"\nBaseline commit: {os.environ.get('PRIOR_FINDINGS_COMMIT', 'unknown')}"
                  f"\nBaseline submitted_at: {os.environ.get('PRIOR_FINDINGS_SUBMITTED_AT', 'unknown')}\n"
              )

          def call_anthropic():
              payload = {
                  "model": "claude-sonnet-4-6",
                  "max_tokens": 1024,
                  "system": system_prompt,
                  "messages": [{"role": "user", "content": user_content}],
              }
              req = urllib.request.Request(
                  "https://api.anthropic.com/v1/messages",
                  data=json.dumps(payload).encode(),
                  headers={
                      "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                      "anthropic-version": "2023-06-01",
                      "content-type": "application/json",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  body = json.loads(resp.read())
              return body["content"][0]["text"]

          def extract_openai_output_text(body):
              if isinstance(body, dict) and isinstance(body.get("output_text"), str) and body["output_text"].strip():
                  return body["output_text"]
              parts = []
              for item in body.get("output", []):
                  if item.get("type") != "message":
                      continue
                  for c in item.get("content", []):
                      text_val = c.get("text")
                      if isinstance(text_val, str) and text_val.strip():
                          parts.append(text_val)
              text = "\n".join(parts).strip()
              if not text:
                  raise RuntimeError("OpenAI response contained no text output")
              return text

          def call_openai():
              payload = {
                  "model": os.environ.get("OPENAI_MODEL", "gpt-5-codex"),
                  "input": [
                      {"role": "system", "content": [{"type": "input_text", "text": system_prompt}]},
                      {"role": "user", "content": [{"type": "input_text", "text": user_content}]},
                  ],
                  "max_output_tokens": 1024,
              }
              req = urllib.request.Request(
                  "https://api.openai.com/v1/responses",
                  data=json.dumps(payload).encode(),
                  headers={
                      "Authorization": f"Bearer {os.environ['OPENAI_API_KEY']}",
                      "content-type": "application/json",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  body = json.loads(resp.read())
              return extract_openai_output_text(body)

          def call_xai():
              payload = {
                  "model": os.environ.get("XAI_MODEL", "grok-4-1-fast-reasoning"),
                  "messages": [
                      {"role": "system", "content": system_prompt},
                      {"role": "user", "content": user_content},
                  ],
                  "max_tokens": 1024,
              }
              req = urllib.request.Request(
                  "https://api.x.ai/v1/chat/completions",
                  data=json.dumps(payload).encode(),
                  headers={
                      "Authorization": f"Bearer {os.environ['XAI_API_KEY']}",
                      "content-type": "application/json",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  body = json.loads(resp.read())
              choices = body.get("choices", [])
              if not choices:
                  raise RuntimeError("xAI response missing choices")
              content = choices[0].get("message", {}).get("content")
              if isinstance(content, list):
                  parts = [c.get("text", "") for c in content if isinstance(c, dict)]
                  content = "\n".join([p for p in parts if p]).strip()
              if not isinstance(content, str) or not content.strip():
                  raise RuntimeError("xAI response contained no text output")
              return content

          provider_order = [p.strip().lower() for p in os.environ.get("REVIEW_PROVIDER_ORDER", "anthropic,openai,xai").split(",") if p.strip()]
          review_text = None
          used_provider = None
          errors = []

          for provider in provider_order:
              try:
                  if provider == "anthropic":
                      if not os.environ.get("ANTHROPIC_API_KEY"):
                          raise RuntimeError("ANTHROPIC_API_KEY missing")
                      review_text = call_anthropic()
                  elif provider == "openai":
                      if not os.environ.get("OPENAI_API_KEY"):
                          raise RuntimeError("OPENAI_API_KEY missing")
                      review_text = call_openai()
                  elif provider == "xai":
                      if not os.environ.get("XAI_API_KEY"):
                          raise RuntimeError("XAI_API_KEY missing")
                      review_text = call_xai()
                  else:
                      raise RuntimeError(f"unsupported provider '{provider}'")
                  used_provider = provider
                  break
              except Exception as e:
                  errors.append(f"{provider}: {e}")

          if not review_text:
              print("All review providers failed:", file=sys.stderr)
              for err in errors:
                  print(f" - {err}", file=sys.stderr)
              sys.exit(1)

          with open("/tmp/review.txt", "w") as f:
              f.write(review_text)

          critical_count = review_text.count("🔴")
          warning_count = review_text.count("🟡")
          fail_on_warnings = os.environ.get("FAIL_ON_WARNINGS", "false") == "true"
          action = "request-changes" if (critical_count > 0 or (fail_on_warnings and warning_count > 0)) else "approve"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"critical-count={critical_count}\n")
              f.write(f"warning-count={warning_count}\n")
              f.write(f"action={action}\n")
              f.write(f"provider={used_provider}\n")

          print(
              f"Review generated via {used_provider}. "
              f"Critical issues: {critical_count}. Warnings: {warning_count}. Action: {action}"
          )
          PYEOF

      - name: Fail if no PR context
        if: steps.pr-context.outputs.has-pr-context != 'true'
        run: |
          echo "Unable to resolve PR context for this run (event=${{ github.event_name }}, sha=${{ github.sha }})." >&2
          exit 1

      - name: Build review body
        run: |
          ACTION="${{ steps.generate.outputs.action }}"
          if [ "$ACTION" = "approve" ]; then
            BADGE="✅ **Approved by Cybill**"
          else
            BADGE="🚫 **Changes Requested by Cybill** (${{ steps.generate.outputs.critical-count }} critical issue(s))"
          fi

          {
            echo "## 🐾 Cybill's Code Review"
            echo ""
            echo "${BADGE}"
            echo ""
            cat /tmp/review.txt
            echo ""
            echo "---"
            echo "— Cybill 🐾 *Chief Code Sniffer, Escape Velocity Ventures*"
            echo ""
            echo "*[Skip future reviews](https://docs.github.com/en/issues/using-labels-and-milestones-to-track-work/managing-labels) by adding the \`skip-review\` label*"
          } > /tmp/review_body.txt

      - name: Mint app token
        id: app-token
        if: needs.setup.outputs.agent-can-approve == 'true' && needs.setup.outputs.has-bot-token == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TINKERBELLE_APP_ID }}
          private-key: ${{ secrets.TINKERBELLE_APP_PRIVATE_KEY }}

      - name: Submit formal review
        if: needs.setup.outputs.agent-can-approve == 'true' && needs.setup.outputs.has-bot-token == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ACTION="${{ steps.generate.outputs.action }}"
          echo "Submitting formal review as TinkerBelle App: --${ACTION}"
          gh pr review "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --${ACTION} \
            --body-file /tmp/review_body.txt

      - name: Post comment (fallback)
        if: needs.setup.outputs.agent-can-approve != 'true' || needs.setup.outputs.has-bot-token != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Posting as comment (app credentials not configured)"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/review_body.txt

      - name: Job summary
        run: |
          {
            echo "## 🐾 Cybill's Code Review"
            echo ""
            echo "**Action:** ${{ steps.generate.outputs.action }}"
            echo "**Provider:** ${{ steps.generate.outputs.provider }}"
            echo "**Critical issues:** ${{ steps.generate.outputs.critical-count }}"
            echo "**Warnings:** ${{ steps.generate.outputs.warning-count }}"
            echo "**Prior-findings mode:** ${{ inputs.constrain-to-prior-findings }}"
            echo "**Prior baseline found:** ${{ steps.prior-findings.outputs.has-prior-findings }}"
            echo "**Mode:** ${{ needs.setup.outputs.has-bot-token == 'true' && needs.setup.outputs.agent-can-approve == 'true' && 'formal review' || 'comment' }}"
            echo ""
            cat /tmp/review.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: General gate
        if: always() && inputs.require-general-pass
        run: |
          ACTION="${{ steps.generate.outputs.action }}"
          if [ "$ACTION" = "request-changes" ]; then
            echo "❌ General gate FAILED — Cybill requested changes"
            exit 1
          fi
          echo "✅ General gate passed"

  # ── Security Review ───────────────────────────────────────────────────────
  security-review:
    name: Security Review (Cybill)
    runs-on: ubuntu-latest
    needs: setup
    if: inputs.enable-security-review && needs.setup.outputs.skip != 'true'
    permissions:
      contents: read
      pull-requests: write
    outputs:
      critical-count: ${{ steps.generate.outputs.critical-count }}
      warning-count: ${{ steps.generate.outputs.warning-count }}
      action: ${{ steps.generate.outputs.action }}
      provider: ${{ steps.generate.outputs.provider }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR context
        id: pr-context
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request

          repo = os.environ["REPO"]
          event_pr = (os.environ.get("EVENT_PR_NUMBER") or "").strip()
          event_head = (os.environ.get("EVENT_HEAD_SHA") or "").strip()
          fallback_sha = (os.environ.get("GITHUB_SHA") or "").strip()

          pr_number = event_pr
          head_sha = event_head or fallback_sha

          if not pr_number and head_sha:
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/commits/{head_sha}/pulls",
                  headers={
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  pulls = json.loads(resp.read())
              if pulls:
                  open_pulls = [p for p in pulls if p.get("state") == "open"]
                  pick = open_pulls[0] if open_pulls else pulls[0]
                  pr_number = str(pick.get("number") or "")
                  if not event_head:
                      head_sha = (pick.get("head") or {}).get("sha") or head_sha

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"pr-number={pr_number}\n")
              f.write(f"head-sha={head_sha}\n")
              f.write(f"has-pr-context={'true' if pr_number else 'false'}\n")
          PYEOF

      - name: Get PR diff
        id: diff
        if: steps.pr-context.outputs.has-pr-context == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr-context.outputs.pr-number }}
        run: |
          RAW_DIFF=$(gh pr diff "${PR_NUMBER}" --repo "${{ github.repository }}" 2>&1)
          DIFF_LEN=${#RAW_DIFF}
          echo "${RAW_DIFF}" > /tmp/pr_diff.txt
          echo "truncated=false" >> "$GITHUB_OUTPUT"
          echo "Diff captured in full (${DIFF_LEN} chars)"
          echo "diff_len=${DIFF_LEN}" >> "$GITHUB_OUTPUT"

      - name: Load prior security findings
        id: prior-findings
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr-context.outputs.pr-number }}
          HEAD_SHA: ${{ steps.pr-context.outputs.head-sha }}
          CONSTRAIN: ${{ inputs.constrain-to-prior-findings }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, urllib.request

          out_path = "/tmp/prior_security_review.txt"
          open(out_path, "w").close()
          if os.environ.get("CONSTRAIN", "true") != "true":
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("has-prior-findings=false\n")
              sys.exit(0)

          repo = os.environ["REPO"]
          pr = (os.environ.get("PR_NUMBER") or "").strip()
          head_sha = (os.environ.get("HEAD_SHA") or "").strip()
          if not pr:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("has-prior-findings=false\n")
              sys.exit(0)
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/pulls/{pr}/reviews?per_page=100",
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              reviews = json.loads(resp.read())

          candidates = []
          for r in reviews:
              user = (r.get("user") or {}).get("login")
              body = r.get("body") or ""
              commit_id = r.get("commit_id") or ""
              submitted = r.get("submitted_at") or ""
              if user != "tinkerbelle-app-for-github[bot]":
                  continue
              if "## 🐾 Cybill's Security Patrol" not in body:
                  continue
              if not submitted or commit_id == head_sha:
                  continue
              candidates.append((submitted, body, commit_id))

          has_prior = bool(candidates)
          if has_prior:
              submitted, body, commit_id = sorted(candidates, key=lambda x: x[0])[-1]
              if len(body) > 12000:
                  body = body[:12000] + "\n\n[truncated prior review context]"
              with open(out_path, "w") as f:
                  f.write(body)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"has-prior-findings={'true' if has_prior else 'false'}\n")
              if has_prior:
                  f.write(f"prior-findings-commit={commit_id}\n")
                  f.write(f"prior-findings-submitted-at={submitted}\n")
          PYEOF

      - name: Generate security review
        id: generate
        if: steps.pr-context.outputs.has-pr-context == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TRUNCATED: ${{ steps.diff.outputs.truncated }}
          DIFF_LEN: ${{ steps.diff.outputs.diff_len }}
          FAIL_ON_WARNINGS: ${{ inputs.fail-on-warnings }}
          REVIEW_PROVIDER_ORDER: ${{ inputs.review-provider-order }}
          OPENAI_MODEL: ${{ inputs.openai-model }}
          XAI_MODEL: ${{ inputs.xai-model }}
          CONSTRAIN_PRIOR: ${{ inputs.constrain-to-prior-findings }}
          HAS_PRIOR_FINDINGS: ${{ steps.prior-findings.outputs.has-prior-findings }}
          PRIOR_FINDINGS_COMMIT: ${{ steps.prior-findings.outputs.prior-findings-commit }}
          PRIOR_FINDINGS_SUBMITTED_AT: ${{ steps.prior-findings.outputs.prior-findings-submitted-at }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, urllib.request, urllib.error

          diff = open("/tmp/pr_diff.txt").read()
          prior_findings = ""
          if os.path.exists("/tmp/prior_security_review.txt"):
              prior_findings = open("/tmp/prior_security_review.txt").read()
          truncated = os.environ.get("TRUNCATED", "false") == "true"
          diff_len = os.environ.get("DIFF_LEN", "0")

          system_prompt = (
              "You are Cybill-Lynne [not a] Shepard, a Great Pyrenees and security reviewer at Escape Velocity Ventures. "
              "You guard this codebase like you guard the yard. Nothing gets past you.\n\n"
              "This is a Kubernetes-native stack (k3s, Supabase, Cloudflare, Dolt) with AI agent orchestration.\n\n"
              "Review this diff ONLY for security concerns:\n\n"
              "🔴 CRITICAL:\n"
              "- Hardcoded secrets, tokens, API keys, passwords (even in comments/tests)\n"
              "- Privilege escalation: k8s securityContext (privileged, hostPID, hostNetwork, capabilities)\n"
              "- RBAC over-grants: ClusterRole with wildcard verbs/resources, ServiceAccount misuse\n"
              "- Auth bypass: missing auth checks, default-allow patterns, token validation gaps\n"
              "- SQL injection, command injection, path traversal\n"
              "- Sensitive data in logs, error messages, or API responses\n\n"
              "🟡 HIGH:\n"
              "- Insecure defaults (TLS disabled without comment, permissive CORS, open ports)\n"
              "- Missing input validation on user-facing endpoints\n"
              "- Dependency issues (known vulnerable packages, unpinned versions)\n"
              "- Secrets in environment variables without k8s Secret references\n"
              "- Missing NetworkPolicy implications\n"
              "- Overly broad file permissions\n\n"
              "🟢 ADVISORY:\n"
              "- Security best practices that could be improved\n"
              "- Missing security headers\n"
              "- Audit logging gaps\n\n"
              "Rules:\n"
              "- ONLY flag actual security issues. Do not review code quality, style, or correctness.\n"
              "- If no security issues found, say exactly: \"✅ Yard is secure. No intruders detected. *resumes nap*\"\n"
              "- Sign off as Cybill. Use dog metaphors sparingly.\n"
              "- Do not invent problems. False positives erode trust.\n"
              "- For each finding: severity, file/line, what's wrong, how to fix it.\n"
              "- Context: this codebase has had incidents with privileged terminal pods (PM-044), "
              "silent config errors, and shared ServiceAccounts."
          )
          constrain_prior = os.environ.get("CONSTRAIN_PRIOR", "true") == "true"
          has_prior = os.environ.get("HAS_PRIOR_FINDINGS", "false") == "true"
          if constrain_prior and has_prior:
              system_prompt += (
                  "\n\nREVIEW MODE: PRIOR-FINDINGS-ONLY\n"
                  "- Validate remediation against the provided prior security findings baseline.\n"
                  "- Report only unresolved prior findings.\n"
                  "- Do NOT introduce net-new findings unless they are clearly 🔴 Critical security regressions.\n"
                  "- If prior findings are resolved, return an approving security review.\n"
              )

          user_content = f"Security review this PR diff:\n\n```diff\n{diff}\n```"
          if truncated:
              user_content += f"\n\n> ⚠️ Diff was truncated (full diff: {diff_len} chars). Review what's visible."
          if constrain_prior and has_prior and prior_findings.strip():
              user_content += (
                  "\n\nPrior Cybill Security findings baseline (only unresolved findings should be reported):\n\n"
                  f"{prior_findings}\n"
                  f"\nBaseline commit: {os.environ.get('PRIOR_FINDINGS_COMMIT', 'unknown')}"
                  f"\nBaseline submitted_at: {os.environ.get('PRIOR_FINDINGS_SUBMITTED_AT', 'unknown')}\n"
              )

          def call_anthropic():
              payload = {
                  "model": "claude-sonnet-4-6",
                  "max_tokens": 1024,
                  "system": system_prompt,
                  "messages": [{"role": "user", "content": user_content}],
              }
              req = urllib.request.Request(
                  "https://api.anthropic.com/v1/messages",
                  data=json.dumps(payload).encode(),
                  headers={
                      "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                      "anthropic-version": "2023-06-01",
                      "content-type": "application/json",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  body = json.loads(resp.read())
              return body["content"][0]["text"]

          def extract_openai_output_text(body):
              if isinstance(body, dict) and isinstance(body.get("output_text"), str) and body["output_text"].strip():
                  return body["output_text"]
              parts = []
              for item in body.get("output", []):
                  if item.get("type") != "message":
                      continue
                  for c in item.get("content", []):
                      text_val = c.get("text")
                      if isinstance(text_val, str) and text_val.strip():
                          parts.append(text_val)
              text = "\n".join(parts).strip()
              if not text:
                  raise RuntimeError("OpenAI response contained no text output")
              return text

          def call_openai():
              payload = {
                  "model": os.environ.get("OPENAI_MODEL", "gpt-5-codex"),
                  "input": [
                      {"role": "system", "content": [{"type": "input_text", "text": system_prompt}]},
                      {"role": "user", "content": [{"type": "input_text", "text": user_content}]},
                  ],
                  "max_output_tokens": 1024,
              }
              req = urllib.request.Request(
                  "https://api.openai.com/v1/responses",
                  data=json.dumps(payload).encode(),
                  headers={
                      "Authorization": f"Bearer {os.environ['OPENAI_API_KEY']}",
                      "content-type": "application/json",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  body = json.loads(resp.read())
              return extract_openai_output_text(body)

          def call_xai():
              payload = {
                  "model": os.environ.get("XAI_MODEL", "grok-4-1-fast-reasoning"),
                  "messages": [
                      {"role": "system", "content": system_prompt},
                      {"role": "user", "content": user_content},
                  ],
                  "max_tokens": 1024,
              }
              req = urllib.request.Request(
                  "https://api.x.ai/v1/chat/completions",
                  data=json.dumps(payload).encode(),
                  headers={
                      "Authorization": f"Bearer {os.environ['XAI_API_KEY']}",
                      "content-type": "application/json",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  body = json.loads(resp.read())
              choices = body.get("choices", [])
              if not choices:
                  raise RuntimeError("xAI response missing choices")
              content = choices[0].get("message", {}).get("content")
              if isinstance(content, list):
                  parts = [c.get("text", "") for c in content if isinstance(c, dict)]
                  content = "\n".join([p for p in parts if p]).strip()
              if not isinstance(content, str) or not content.strip():
                  raise RuntimeError("xAI response contained no text output")
              return content

          provider_order = [p.strip().lower() for p in os.environ.get("REVIEW_PROVIDER_ORDER", "anthropic,openai,xai").split(",") if p.strip()]
          review_text = None
          used_provider = None
          errors = []

          for provider in provider_order:
              try:
                  if provider == "anthropic":
                      if not os.environ.get("ANTHROPIC_API_KEY"):
                          raise RuntimeError("ANTHROPIC_API_KEY missing")
                      review_text = call_anthropic()
                  elif provider == "openai":
                      if not os.environ.get("OPENAI_API_KEY"):
                          raise RuntimeError("OPENAI_API_KEY missing")
                      review_text = call_openai()
                  elif provider == "xai":
                      if not os.environ.get("XAI_API_KEY"):
                          raise RuntimeError("XAI_API_KEY missing")
                      review_text = call_xai()
                  else:
                      raise RuntimeError(f"unsupported provider '{provider}'")
                  used_provider = provider
                  break
              except Exception as e:
                  errors.append(f"{provider}: {e}")

          if not review_text:
              print("All review providers failed:", file=sys.stderr)
              for err in errors:
                  print(f" - {err}", file=sys.stderr)
              sys.exit(1)

          with open("/tmp/security_review.txt", "w") as f:
              f.write(review_text)

          critical_count = review_text.count("🔴")
          warning_count = review_text.count("🟡")
          fail_on_warnings = os.environ.get("FAIL_ON_WARNINGS", "false") == "true"
          action = "request-changes" if (critical_count > 0 or (fail_on_warnings and warning_count > 0)) else "approve"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"critical-count={critical_count}\n")
              f.write(f"warning-count={warning_count}\n")
              f.write(f"action={action}\n")
              f.write(f"provider={used_provider}\n")

          print(
              f"Security review generated via {used_provider}. "
              f"Critical issues: {critical_count}. Warnings: {warning_count}. Action: {action}"
          )
          PYEOF

      - name: Fail if no PR context
        if: steps.pr-context.outputs.has-pr-context != 'true'
        run: |
          echo "Unable to resolve PR context for this run (event=${{ github.event_name }}, sha=${{ github.sha }})." >&2
          exit 1

      - name: Build security review body
        run: |
          ACTION="${{ steps.generate.outputs.action }}"
          CRITICAL_COUNT="${{ steps.generate.outputs.critical-count }}"
          WARNING_COUNT="${{ steps.generate.outputs.warning-count }}"

          if [ "$ACTION" = "approve" ]; then
            BADGE="✅ **Security Patrol: Clear**"
          else
            BADGE="🚨 **Security Issues Found** — ${CRITICAL_COUNT} critical / ${WARNING_COUNT} warning issue(s) must be resolved before merge"
          fi

          {
            echo "## 🐾 Cybill's Security Patrol"
            echo ""
            echo "${BADGE}"
            echo ""
            cat /tmp/security_review.txt
            echo ""
            echo "---"
            echo "— Cybill 🐾 *Chief Security Sniffer, Escape Velocity Ventures*"
            echo ""
            echo "*[Skip future reviews](https://docs.github.com/en/issues/using-labels-and-milestones-to-track-work/managing-labels) by adding the \`skip-review\` label*"
          } > /tmp/security_review_body.txt

      - name: Mint app token
        id: app-token
        if: needs.setup.outputs.agent-can-approve == 'true' && needs.setup.outputs.has-bot-token == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TINKERBELLE_APP_ID }}
          private-key: ${{ secrets.TINKERBELLE_APP_PRIVATE_KEY }}

      - name: Submit formal security review
        if: needs.setup.outputs.agent-can-approve == 'true' && needs.setup.outputs.has-bot-token == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ACTION="${{ steps.generate.outputs.action }}"
          echo "Submitting formal security review as TinkerBelle App: --${ACTION}"
          gh pr review "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --${ACTION} \
            --body-file /tmp/security_review_body.txt

      - name: Post comment (fallback)
        if: needs.setup.outputs.agent-can-approve != 'true' || needs.setup.outputs.has-bot-token != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Posting as comment (app credentials not configured)"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/security_review_body.txt

      - name: Job summary
        run: |
          {
            echo "## 🐾 Cybill's Security Patrol"
            echo ""
            echo "**Action:** ${{ steps.generate.outputs.action }}"
            echo "**Provider:** ${{ steps.generate.outputs.provider }}"
            echo "**Critical issues:** ${{ steps.generate.outputs.critical-count }}"
            echo "**Warnings:** ${{ steps.generate.outputs.warning-count }}"
            echo "**Prior-findings mode:** ${{ inputs.constrain-to-prior-findings }}"
            echo "**Prior baseline found:** ${{ steps.prior-findings.outputs.has-prior-findings }}"
            echo ""
            cat /tmp/security_review.txt
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Security Gate ─────────────────────────────────────────────────────────
  # Add this as a required status check in branch protection to block merges
  # when CRITICAL security issues are found.
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [setup, security-review]
    # Run even if security-review was skipped (gate passes if review skipped)
    if: always() && inputs.enable-security-review

    steps:
      - name: Evaluate security gate
        run: |
          REQUIRE_PASS="${{ needs.setup.outputs.require-security-pass }}"
          CRITICAL_COUNT="${{ needs.security-review.outputs.critical-count }}"
          WARNING_COUNT="${{ needs.security-review.outputs.warning-count }}"
          ACTION="${{ needs.security-review.outputs.action }}"
          REVIEW_RESULT="${{ needs.security-review.result }}"
          SKIP="${{ needs.setup.outputs.skip }}"

          echo "require-security-pass: ${REQUIRE_PASS}"
          echo "critical-count: ${CRITICAL_COUNT}"
          echo "warning-count: ${WARNING_COUNT}"
          echo "action: ${ACTION}"
          echo "security-review result: ${REVIEW_RESULT}"
          echo "skip-review label: ${SKIP}"

          # Gate passes if: review was skipped, or not required, or review approved
          if [ "$SKIP" = "true" ]; then
            echo "✅ Security gate bypassed (skip-review label)"
            exit 0
          fi

          if [ "$REVIEW_RESULT" = "skipped" ] || [ "$REQUIRE_PASS" != "true" ]; then
            echo "✅ Security gate not enforced for this repo"
            exit 0
          fi

          if [ -n "$ACTION" ] && [ "$ACTION" = "approve" ]; then
            echo "✅ Security gate passed — review action approved"
            exit 0
          fi

          echo "❌ Security gate FAILED — Cybill requested changes (critical: ${CRITICAL_COUNT:-0}, warnings: ${WARNING_COUNT:-0})"
          echo ""
          echo "See Cybill's Security Patrol comment on this PR for details."
          exit 1

      - name: Gate summary
        if: always()
        run: |
          CRITICAL_COUNT="${{ needs.security-review.outputs.critical-count }}"
          WARNING_COUNT="${{ needs.security-review.outputs.warning-count }}"
          ACTION="${{ needs.security-review.outputs.action }}"
          {
            echo "## 🛡️ Security Gate"
            echo ""
            if [ "${{ needs.security-review.result }}" = "success" ] && [ "${ACTION}" = "approve" ]; then
              echo "✅ Passed — yard is secure"
            elif [ "${{ needs.setup.outputs.skip }}" = "true" ]; then
              echo "⏭️ Skipped (skip-review label)"
            else
              echo "❌ Failed — critical: ${CRITICAL_COUNT:-0}, warnings: ${WARNING_COUNT:-0}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
