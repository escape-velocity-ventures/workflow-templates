# Reusable Secrets Scan Workflow
# Purpose: Detect leaked secrets in git history using gitleaks
#
# Auto-detects scan mode from event type:
#   - push/pull_request: incremental scan (new commits only)
#   - schedule/workflow_dispatch: full history scan
#
# Usage in other workflows:
#
#   jobs:
#     scan:
#       uses: escape-velocity-ventures/workflow-templates/.github/workflows/reusable-secrets-scan.yml@main

name: Reusable Secrets Scan

on:
  workflow_call:
    inputs:
      gitleaks-version:
        description: 'Gitleaks release version'
        required: false
        type: string
        default: '8.21.2'
      fail-on-secrets:
        description: 'Fail workflow when secrets are detected'
        required: false
        type: boolean
        default: true

jobs:
  secrets-scan:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION="${{ inputs.gitleaks-version }}"
          ARCH=$(uname -m)
          case $ARCH in
            aarch64|arm64) GL_ARCH="arm64" ;;
            *) GL_ARCH="amd64" ;;
          esac
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_${GL_ARCH}.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          chmod +x /tmp/gitleaks
          /tmp/gitleaks version

      - name: Run secrets scan
        id: scan
        run: |
          # Incremental on push/PR (scan only new commits), full on schedule/dispatch
          SCAN_ARGS="--source . --verbose"
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            BEFORE="${{ github.event.before }}"
            if [ -n "${BEFORE}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ]; then
              SCAN_ARGS="${SCAN_ARGS} --log-opts=${BEFORE}..${{ github.sha }}"
              echo "Incremental scan: ${BEFORE}...${{ github.sha }}"
            else
              echo "First push or PR — full history scan"
            fi
          else
            echo "Scheduled/manual — full history scan"
          fi

          set +e
          /tmp/gitleaks detect ${SCAN_ARGS}
          EXIT_CODE=$?
          set -e

          echo "exit-code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

          if [ "${EXIT_CODE}" -eq 0 ]; then
            echo "No secrets found."
          elif [ "${EXIT_CODE}" -eq 1 ]; then
            echo "SECRETS DETECTED — review output above."
          else
            echo "Gitleaks error (exit code: ${EXIT_CODE})"
            exit "${EXIT_CODE}"
          fi

      - name: Enforce scan result
        if: always()
        run: |
          EXIT_CODE="${{ steps.scan.outputs.exit-code }}"
          FAIL_ON_SECRETS="${{ inputs.fail-on-secrets }}"
          if [ "${EXIT_CODE}" = "1" ] && [ "${FAIL_ON_SECRETS}" = "true" ]; then
            echo "SECRETS DETECTED — failing workflow. Review findings and remediate."
            exit 1
          elif [ "${EXIT_CODE}" = "1" ]; then
            echo "⚠️ SECRETS DETECTED — workflow configured to continue (fail-on-secrets: false)"
          fi
