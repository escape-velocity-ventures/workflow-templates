# Reusable Container Build Workflow
# Purpose: Enforce multi-arch builds (linux/amd64,linux/arm64) as default
# Created: 2026-01-22 as remediation for POST-MORTEM-2026-01-22
#
# This reusable workflow ensures all container images are built for both
# amd64 and arm64 architectures, preventing platform mismatch errors.
#
# Supports both GitHub Actions (GHCR) and Gitea Actions (DinD) runners.
#
# Usage in other workflows:
#
#   jobs:
#     build:
#       uses: escape-velocity-ventures/workflow-templates/.github/workflows/reusable-container-build.yml@main
#       with:
#         image-name: my-service
#         context: ./src
#         dockerfile: ./src/Dockerfile   # path relative to repo root
#       secrets: inherit

name: Reusable Container Build

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Name of the container image (without registry prefix)'
        required: true
        type: string
      context:
        description: 'Build context path (default: .)'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile (default: Dockerfile)'
        required: false
        type: string
        default: 'Dockerfile'
      platforms:
        description: 'Target platforms (default: linux/amd64,linux/arm64 - REQUIRED FOR PRODUCTION)'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      push:
        description: 'Push to registry (default: true for non-PR)'
        required: false
        type: boolean
        default: true
      registry:
        description: 'Container registry (default: ghcr.io)'
        required: false
        type: string
        default: 'ghcr.io'
      registry-org:
        description: 'Registry organization (default: escape-velocity-ventures)'
        required: false
        type: string
        default: 'escape-velocity-ventures'
      extra-tags:
        description: 'Additional tags (newline-separated)'
        required: false
        type: string
        default: ''
      buildkitd-config:
        description: 'Buildx BuildKit config (e.g. insecure registries, mirrors)'
        required: false
        type: string
        default: ''
      install-docker-cli:
        description: 'Install Docker CLI in DinD environments'
        required: false
        type: boolean
        default: false
      docker-version:
        description: 'Docker CLI version when install-docker-cli is true'
        required: false
        type: string
        default: '27.5.1'
      cache-type:
        description: 'Cache backend: gha or registry'
        required: false
        type: string
        default: 'gha'
      cache-ref:
        description: 'Registry ref for cache (when cache-type=registry)'
        required: false
        type: string
        default: ''
      download-artifact:
        description: 'Artifact name to download before build (empty = skip)'
        required: false
        type: string
        default: ''
      artifact-path:
        description: 'Where to extract the downloaded artifact'
        required: false
        type: string
        default: '.'
    outputs:
      image-tag:
        description: 'Short SHA image tag (7 chars)'
        value: ${{ jobs.build-and-push.outputs.image-tag }}
      image-digest:
        description: 'Image digest from build'
        value: ${{ jobs.build-and-push.outputs.image-digest }}
      image-tags:
        description: 'All image tags (newline-separated)'
        value: ${{ jobs.build-and-push.outputs.image-tags }}
    secrets:
      github-token:
        description: 'GitHub token for registry authentication (optional — falls back to github.token)'
        required: false
      registry-user:
        description: 'Explicit registry username (for DinD/Gitea)'
        required: false
      registry-password:
        description: 'Explicit registry password (for DinD/Gitea)'
        required: false

jobs:
  validate-platforms:
    name: Validate Build Configuration
    runs-on: ubuntu-latest
    env:
      FULL_IMAGE_NAME: ${{ inputs.registry }}/${{ inputs.registry-org }}/${{ inputs.image-name }}
    steps:
      - name: Check multi-arch requirement
        run: |
          PLATFORMS="${{ inputs.platforms }}"
          echo "## Build Configuration Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if both architectures are included
          if [[ "$PLATFORMS" == *"amd64"* ]] && [[ "$PLATFORMS" == *"arm64"* ]]; then
            echo "✅ Multi-arch build configured: $PLATFORMS" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ WARNING: Single-arch build detected: $PLATFORMS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Per POST-MORTEM-2026-01-22, all production containers MUST support both amd64 and arm64." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "If this is intentional (e.g., architecture-specific tooling), document the reason." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ env.FULL_IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- Context: ${{ inputs.context }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dockerfile: ${{ inputs.dockerfile }}" >> $GITHUB_STEP_SUMMARY
          echo "- Platforms: ${{ inputs.platforms }}" >> $GITHUB_STEP_SUMMARY

  build-and-push:
    name: Build and Push Container
    runs-on: ubuntu-latest
    needs: [validate-platforms]
    permissions:
      contents: read
      packages: write
    env:
      FULL_IMAGE_NAME: ${{ inputs.registry }}/${{ inputs.registry-org }}/${{ inputs.image-name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        if: inputs.download-artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.download-artifact }}
          path: ${{ inputs.artifact-path }}

      - name: Install Docker CLI
        if: inputs.install-docker-cli
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            aarch64|arm64) DOCKER_ARCH="aarch64" ;;
            *) DOCKER_ARCH="x86_64" ;;
          esac
          for i in 1 2 3; do
            if curl -fsSL --connect-timeout 30 --retry 3 \
              "https://download.docker.com/linux/static/stable/${DOCKER_ARCH}/docker-${{ inputs.docker-version }}.tgz" -o /tmp/docker.tgz; then
              break
            fi
            echo "Download attempt $i failed, retrying..."
            sleep 5
          done
          tar xzf /tmp/docker.tgz -C /tmp
          mv /tmp/docker/docker /usr/local/bin/docker
          chmod +x /usr/local/bin/docker
          rm -rf /tmp/docker /tmp/docker.tgz
          docker version || echo "Docker CLI installed (daemon check may fail without socket)"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ inputs.platforms }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: ${{ inputs.buildkitd-config }}

      - name: Log in to Container Registry
        if: inputs.push && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.registry-user || github.actor }}
          password: ${{ secrets.registry-password || secrets.github-token || github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FULL_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            ${{ inputs.extra-tags }}

      - name: Compute immutable image tag
        id: sha
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: ${{ inputs.cache-type == 'registry' && format('type=registry,ref={0}', inputs.cache-ref) || 'type=gha' }}
          cache-to: ${{ inputs.cache-type == 'registry' && format('type=registry,ref={0},mode=max', inputs.cache-ref) || 'type=gha,mode=max' }}

      - name: Verify multi-arch manifest
        if: inputs.push && github.event_name != 'pull_request'
        run: |
          echo "## Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags Pushed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Verify manifest includes expected platforms
          echo "### Platform Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verifying ${{ env.FULL_IMAGE_NAME }}:latest includes all platforms..." >> $GITHUB_STEP_SUMMARY

          # Note: This verification runs after push, so manifest should be available
          if docker manifest inspect ${{ env.FULL_IMAGE_NAME }}:latest > /dev/null 2>&1; then
            echo "✅ Manifest accessible" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Could not verify manifest (may require authentication)" >> $GITHUB_STEP_SUMMARY
          fi

    outputs:
      image-tag: ${{ steps.sha.outputs.tag }}
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}
