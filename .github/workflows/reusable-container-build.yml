# Reusable Container Build Workflow
# Purpose: Build and push container images using plain `docker build` (Podman-compatible)
# Created: 2026-01-22 as remediation for POST-MORTEM-2026-01-22
# Updated: 2026-04-02 — replaced buildx/QEMU with plain docker build
#
# POST-MORTEM-2026-01-22 originally required multi-arch (amd64+arm64) builds.
# As of 2026-04-02, the cluster is 100% ARM64 (7/7 nodes). Multi-arch is no
# longer needed. Buildx's docker-container driver is incompatible with Podman's
# Docker socket ("cannot set cgroup parent if not creating cgroups"), which is
# the container runtime on all Gitea Actions runners.
#
# If the cluster ever adds amd64 nodes, re-evaluate multi-arch builds.
# The plain `docker build` approach builds natively for the runner's architecture.
#
# Usage in other workflows:
#
#   jobs:
#     build:
#       uses: escape-velocity-ventures/workflow-templates/.github/workflows/reusable-container-build.yml@main
#       with:
#         image-name: my-service
#         context: ./src
#         dockerfile: ./src/Dockerfile
#       secrets: inherit

name: Reusable Container Build

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Name of the container image (without registry prefix)'
        required: true
        type: string
      context:
        description: 'Build context path (default: .)'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile (default: Dockerfile)'
        required: false
        type: string
        default: 'Dockerfile'
      push:
        description: 'Push to registry (default: true for non-PR)'
        required: false
        type: boolean
        default: true
      registry:
        description: 'Container registry (default: ghcr.io)'
        required: false
        type: string
        default: 'ghcr.io'
      registry-org:
        description: 'Registry organization (default: escape-velocity-ventures)'
        required: false
        type: string
        default: 'escape-velocity-ventures'
      extra-tags:
        description: 'Additional tags (space-separated)'
        required: false
        type: string
        default: ''
      install-docker-cli:
        description: 'Install Docker CLI in DinD environments'
        required: false
        type: boolean
        default: false
      docker-version:
        description: 'Docker CLI version when install-docker-cli is true'
        required: false
        type: string
        default: '27.5.1'
      download-artifact:
        description: 'Artifact name to download before build (empty = skip)'
        required: false
        type: string
        default: ''
      artifact-path:
        description: 'Where to extract the downloaded artifact'
        required: false
        type: string
        default: '.'
    outputs:
      image-tag:
        description: 'Short SHA image tag (7 chars)'
        value: ${{ jobs.build-and-push.outputs.image-tag }}
      image-digest:
        description: 'Image digest from build'
        value: ${{ jobs.build-and-push.outputs.image-digest }}
      image-tags:
        description: 'All image tags (newline-separated)'
        value: ${{ jobs.build-and-push.outputs.image-tags }}
    secrets:
      github-token:
        description: 'GitHub token for registry authentication (optional — falls back to github.token)'
        required: false
      registry-user:
        description: 'Explicit registry username (for DinD/Gitea)'
        required: false
      registry-password:
        description: 'Explicit registry password (for DinD/Gitea)'
        required: false

jobs:
  build-and-push:
    name: Build and Push Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FULL_IMAGE_NAME: ${{ inputs.registry }}/${{ inputs.registry-org }}/${{ inputs.image-name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        if: inputs.download-artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.download-artifact }}
          path: ${{ inputs.artifact-path }}

      - name: Install Docker CLI
        if: inputs.install-docker-cli
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            aarch64|arm64) DOCKER_ARCH="aarch64" ;;
            *) DOCKER_ARCH="x86_64" ;;
          esac
          for i in 1 2 3; do
            if curl -fsSL --connect-timeout 30 --retry 3 \
              "https://download.docker.com/linux/static/stable/${DOCKER_ARCH}/docker-${{ inputs.docker-version }}.tgz" -o /tmp/docker.tgz; then
              break
            fi
            echo "Download attempt $i failed, retrying..."
            sleep 5
          done
          tar xzf /tmp/docker.tgz -C /tmp
          mv /tmp/docker/docker /usr/local/bin/docker
          chmod +x /usr/local/bin/docker
          rm -rf /tmp/docker /tmp/docker.tgz
          docker version || echo "Docker CLI installed (daemon check may fail without socket)"

      - name: Log in to Container Registry
        if: inputs.push && github.event_name != 'pull_request'
        run: |
          REGISTRY="${{ inputs.registry }}"
          USER="${{ secrets.registry-user }}"
          PASS="${{ secrets.registry-password }}"

          # Fall back to github actor/token if no explicit credentials
          if [ -z "$USER" ]; then USER="${{ github.actor }}"; fi
          if [ -z "$PASS" ]; then PASS="${{ secrets.github-token || github.token }}"; fi

          echo "$PASS" | docker login "$REGISTRY" -u "$USER" --password-stdin

      - name: Compute immutable image tag
        id: sha
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build container image
        id: build
        run: |
          TAG="${{ steps.sha.outputs.tag }}"
          IMAGE="${{ env.FULL_IMAGE_NAME }}"
          DOCKERFILE="${{ inputs.dockerfile }}"

          # Build all tags
          TAG_FLAGS="-t ${IMAGE}:${TAG}"

          # Add latest tag for default branch
          if [ "${{ github.ref }}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; then
            TAG_FLAGS="$TAG_FLAGS -t ${IMAGE}:latest"
          fi

          # Add extra tags
          EXTRA="${{ inputs.extra-tags }}"
          for extra_tag in $EXTRA; do
            TAG_FLAGS="$TAG_FLAGS -t ${IMAGE}:${extra_tag}"
          done

          echo "Building ${IMAGE}:${TAG} from ${DOCKERFILE}"
          docker build $TAG_FLAGS -f "$DOCKERFILE" "${{ inputs.context }}"

          # Capture all tags for output
          ALL_TAGS="${IMAGE}:${TAG}"
          if [ "${{ github.ref }}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; then
            ALL_TAGS="${ALL_TAGS}\n${IMAGE}:latest"
          fi
          for extra_tag in $EXTRA; do
            ALL_TAGS="${ALL_TAGS}\n${IMAGE}:${extra_tag}"
          done
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$ALL_TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Push container image
        if: inputs.push && github.event_name != 'pull_request'
        run: |
          TAG="${{ steps.sha.outputs.tag }}"
          IMAGE="${{ env.FULL_IMAGE_NAME }}"

          echo "Pushing ${IMAGE}:${TAG}"
          docker push "${IMAGE}:${TAG}"

          # Push latest tag for default branch
          if [ "${{ github.ref }}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; then
            echo "Pushing ${IMAGE}:latest"
            docker push "${IMAGE}:latest"
          fi

          # Push extra tags
          EXTRA="${{ inputs.extra-tags }}"
          for extra_tag in $EXTRA; do
            echo "Pushing ${IMAGE}:${extra_tag}"
            docker push "${IMAGE}:${extra_tag}"
          done

          # Get digest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}:${TAG}" 2>/dev/null | cut -d@ -f2 || echo "")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Build Summary
        if: always()
        run: |
          echo "## Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ env.FULL_IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: ${{ steps.sha.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- Context: ${{ inputs.context }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dockerfile: ${{ inputs.dockerfile }}" >> $GITHUB_STEP_SUMMARY
          echo "- Architecture: $(uname -m)" >> $GITHUB_STEP_SUMMARY
          echo "- Push: ${{ inputs.push && github.event_name != 'pull_request' }}" >> $GITHUB_STEP_SUMMARY

    outputs:
      image-tag: ${{ steps.sha.outputs.tag }}
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.build.outputs.tags }}
